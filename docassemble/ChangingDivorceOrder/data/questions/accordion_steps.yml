comment: |
  2026-05-15 adapting for TrueFiling
  Learn step for custody and divorce if modifying custody or child support. Child support interview has its own learn_modify_child_support_step. 
template: modify_step
subject: |
  Step ${ modify_idx }:
    % if user_need in('change custody order', 'change foreign custody order'):
    Learn about motions to modify
    % elif user_need == 'change divorce order':
    Learn about a Motion to Modify your Parenting Plan
    % elif (user_need =='respond to motion in custody' and type_of_response == 'modify') or (user_need == 'respond to motion in divorce' and type_of_response == 'modify' and type_of_modification['custody']):
    Learn about motions to modify custody or a Parenting Plan order
    % elif user_need == 'respond to motion in divorce' and type_of_response == 'modify' and type_of_modification['child support'] and not type_of_modification['custody']:
    Learn about motions to modify a child support order
    % endif
content: |
  % if not user_need in('respond to motion in custody', 'respond to motion in divorce'):
  Changing your parenting plan or child support order is called "modifying" it. To ask the judge to change your order, file a **Motion to Modify**.
  % elif user_need in('respond to motion in custody', 'respond to motion in divorce'):
  Your judge will decide the motion based on ${ other_party_in_case }'s request, your response, and the law. Learning about the law can help you decide what to write in your response.
  % endif
  % if user_need == 'change foreign custody order' or (user_need == 'change divorce order' and middle_of_case == 'no' and type_of_final_order['custody order'] and why_change in('review', 'schedule')) or (user_need in('respond to motion in custody', 'respond to motion in divorce') and type_of_response == 'modify' and type_of_modification['custody']):  
  The courts want children to have a regular schedule without a lot of changes. The courts will generally only change a parenting plan if there is a "substantial change in circumstances." A "substantial change in circumstances" means something has happened so that the old custody or parenting plan is no longer in the children's best interest.

  <div class="step-subheading">Some examples</div>
  <ul>
  <li>The current parenting plan order started when your child was an infant. They move between parents at noon Mondays, Wednesdays, and Fridays. Your child is starting kindergarten so the current schedule will not work.</li>
  <li>Under the current parenting plan order, your children spend one week with you and the next week with the other parent.  You are going to move out of state so the current schedule is impossible.</li>
  <li>Your children spend overnights with you and the other parent.  The other parent just went to jail for 2 years so the existing schedule is impossible.</li>
  <li>There was a new act of domestic violence between you and the other parent when you were exchanging the children.</li>
  </ul>
  % if user_need == 'change foreign custody order' or (not user_need in('respond to motion in custody', 'respond to motion in divorce') and middle_of_case == 'no'):
  The court charges $75 to file this motion. If you cannot afford the fee, you may be able to get the court to waive it. See ${ truefiling_file_and_serve_step.subject }.
  % endif
  
  If the judge decides there is a substantial change of circumstances, the judge will order a new parenting plan in the children's best interest.
  
  If the judge changes the parenting plan, the judge may issue a new child support order.
  % endif
  
  % if  user_need == 'respond to motion in divorce' and type_of_response == 'modify' and type_of_modification['child support'] and not type_of_modification['custody']:
  The child support rule, [Alaska Rule of Civil Procedure 90.3](https://ak-courts.info/civrules), states you need to prove there has been a “material change in circumstances” to modify child support. The most common changes in circumstances are:
  
  * Your children's schedule changes and they spend more or fewer overnights with you than they used to, or
  * Your income or the other parent's income changes.
  
  There needs to be:
  
  * A 15% change in the amount of child support ordered. So that when you calculate support based on the parents' current income, the amount is 15% more or less than the current support order.
  
  Or
  
  *  A change in the parenting plan that affects the child support formula. For example, changing from a primary custody to shared custody plan will probably change the amount of child support.
  
  If the judge decides there is a material change of circumstances, the judge will calculate a new child support order.
  % endif
  The Alaska Supreme Court has issued many [decisions](https://courts.alaska.gov/shc/family/shclaws.htm#cases) about what types of circumstances amount to a change of circumstances allowing a modification.
---
template: expect_after_motion_or_answer_step
subject: |
  Step ${ expect_after_motion_or_answer_idx }:
  % if (user_need == 'answer custody' and type_of_response.all_true('ak custody case', exclusive = True)) or (user_need == 'answer divorce' and type_of_response.all_true('ak divorce case', exclusive = True)) or (user_need in ('answer custody', 'answer divorce') and type_of_response['case in 2 states'] and not type_of_response['default'] and stage_of_other_case == 'ended with no order'):
  What to expect after you file your Answer
  % elif user_need == 'answer custody' and type_of_response.all_false():
  What to expect after you file your Complaint
  % else:
  What to expect after you file your documents
  % endif
content: |   
  % if user_need in('answer custody', 'answer divorce') and type_of_response['case in 2 states'] and stage_of_other_case == 'still going':
  
  Every case is different, but sometimes it is clear only one court has jurisdiction over the case. When this happens, one state court may close its case.
  
  If it is not clear, the Alaska court will often hold a hearing and call the other court to talk about which case will move forward.
  
  Pay attention to what is happening in both cases until you know which state will decide the case.
  
  Jurisdiction can be very complicated. [Talking to a lawyer](https://ak-courts.info/findlawyer) can help you decide which is the best state for your case.
  
  % elif (user_need == 'answer custody' and type_of_response.all_true('ak custody case', exclusive = True)) or (user_need == 'answer divorce' and type_of_response.all_true('ak divorce case', exclusive = True)) or (user_need in ('answer custody', 'answer divorce') and type_of_response['case in 2 states'] and not type_of_response['default'] and stage_of_other_case == 'ended with no order') or (user_need in ('answer custody', 'answer divorce') and type_of_response.all_false()):
  <div class='step-subheading'>The court will set a hearing</div>

  They will send you a notice with the date and time of the hearing.
  
  % if user_need == 'answer divorce' and not (type_of_response['case in 2 states'] and stage_of_other_case in ('still going', 'ended with order')):
  Within 45 days of filing your answer, both of you are supposed to tell each other about all your property and debt. Fill out and give your spouse:
  
  *  **Civil Rule 26.1 Questionnaire, SHC-1010** [Word](https://courts.alaska.gov/shc/family/docs/shc-1010.doc) | [PDF](https://courts.alaska.gov/shc/family/docs/shc-1010n.pdf)
  *  **Property & Debt Worksheet, SHC-1000** [Word](https://courts.alaska.gov/shc/family/docs/shc-1000.doc) | [PDF](https://courts.alaska.gov/shc/family/docs/shc-1000n.pdf)
  
  See the court's web page [Dividing Property & Debt](https://ak-courts.info/property) 

  Watch [Marital Property and Debt](https://youtu.be/PTpeFwVSY-o?si=M8kis_SAeRHfylOZ)
  % endif  

  % else:   
  % if user_need in('answer custody', 'answer divorce') and type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  If you ask to dismiss the case, ${ other_party_in_case } may file a response or "opposition."
  % else:
  ${ capitalize(other_party_in_case) } may file a response or "opposition."
  % endif
  
  If ${ other_party_in_case } files a response, you can file a reply to give the judge new information that answers their opposition. You do not need to repeat what you put in your original motion.

  * Use *Reply Response, TF 708** [[Fill in PDF](https://ak-courts.info/tf708)].
  * Watch 2 videos:
      * [Motions Part 3: Preparing a Reply](https://youtube.com/watch?v=egoBeRFB_Uw), and
      *  [Motions Part 4: Mailings and Deadlines](https://www.youtube.com/watch?v=YQvG7GEGeoo).
  * Read:
      * [How do I reply to an opposition?](https://ak-courts.info/motreply) on the court's website.

  The court may decide without a hearing or set a hearing about the motion.
    
  % if user_need in('answer custody', 'answer divorce') and type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  
  **If the judge denies your motion to dismiss the case it is important to file an Answer.** If you do not file an Answer, ${ other_party_in_case } may ask for a default judgment and the judge may decide without hearing your side.
  % endif 
  % endif
---
