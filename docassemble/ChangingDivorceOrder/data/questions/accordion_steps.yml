---
generic object: ALDocumentBundle
template: x.get_email_copy
content: |
  Email a copy of your Action Plan to yourself or someone else
---
generic object: ALDocumentBundle
template: x.send_email_template
subject: |
  % if user_need == 'change foreign custody order':
  Your Action Plan for changing your custody or Parenting Plan order from another state
  % endif
  % if user_need == 'respond to motion in divorce':
  % if middle_of_case == 'no' and type_of_response == 'appeal':
  Your Action Plan for responding to the appeal your ex filed to change a court order from your divorce case
  % endif
  % if middle_of_case == 'no' and type_of_response != 'appeal':
  Your Action Plan for responding to a motion your ex filed to change a court order from your divorce case
  % endif
  % if middle_of_case == 'yes':
  Your Action Plan for responding to a motion your spouse filed to change a court order in your divorce case
  % endif
  % endif
  % if user_need == 'change divorce order':
  % if middle_of_case == 'no' and type_of_final_order.all_false('spousal support', 'property or debt'):
  Your Action Plan for changing your custody or Parenting Plan order from your divorce case in ${ len(step_list) } steps
  % elif middle_of_case == 'yes':
  Your Action Plan for changing a court order during your divorce case
  % else:
  Your Action Plan for changing a court order from your divorce case
  % endif
  % endif 
content: |
  Thank you for using the Alaska Court System’s Court Guide Action Plan.

  Your Action Plan is attached.

  Get [more information and a list of all the Court Guide Action Plans](https://ak-courts.info/plans).
  
  [ak-courts.info/plans](https://ak-courts.info/plans).
---
id: final screen
decoration: pen-to-square
event: confirmation_and_download
question: |
  % if len(step_list) < 2:
  Get more information or help
  % else:
  # <i class="fa-thin fa-list"></i>Your Court Guide Action Plan is ready!
  % endif
subquestion: |
  % if user_need == 'change foreign custody order':
  #### Your Action Plan for changing your custody or Parenting Plan order from another state in ${ len(step_list) } steps
  % endif
  % if user_need == 'respond to motion in divorce':
  % if middle_of_case == 'no' and type_of_response == 'appeal':
  #### Your Action Plan for responding to the appeal your ex filed to change a court order from your divorce case, in ${ len(step_list) } steps
  % endif
  % if middle_of_case == 'no' and type_of_response != 'appeal':
  #### Your Action Plan for responding to a motion your ex filed to change a court order from your divorce case, in ${ len(step_list) } steps
  % endif
  % if middle_of_case == 'yes':
  #### Your Action Plan for responding to a motion your spouse filed to change a court order in your divorce case, in ${ len(step_list) } steps
  % endif
  % endif
  % if user_need == 'change divorce order':
  % if middle_of_case == 'no' and type_of_final_order.all_false('spousal support', 'property or debt'):
  #### Your Action Plan for changing your custody or Parenting Plan order from your divorce case in ${ len(step_list) } steps
  % elif middle_of_case == 'yes':
  #### Your Action Plan for changing a court order during your divorce case in ${ len(step_list) } steps
  % else:
  #### Your Action Plan for changing a court order from your divorce case in ${ len(step_list) } steps
  % endif
  % endif
    
  % if get_config("debug", False):
  <button id="akc_expand_all" class="btn other stuff">Expand all</button>
  <button id="akc_collapse_all" class="btn other stuff">Collapse all</button>
  % endif  
  
  % for iteration_index, step_tuple in enumerate( step_list ):
  ${ collapse_template(step_tuple[0], closed_icon="plus", open_icon="minus") }
  % endfor
  
  ${ al_user_bundle.download_list_html() }
  
  &nbsp;

  ${ al_user_bundle.send_button_html(show_editable_checkbox=False) }
  
  % if get_config("debug", False):
  [get the docx file](${ docx_changing_divorce_order_attachment.docx.url_for() })
  % endif 
   
buttons:
  - Start over: restart
script: |
  <script>
  let expander = $("#akc_expand_all")
  expander.on("click", function () {
   Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className += " show" })
  })
  
  let collapser = $("#akc_collapse_all")
  collapser.on("click", function () {
      Array.from(document.querySelectorAll('.al_collapse_template .collapse')).forEach((elem) => { elem.className = elem.className.replace(" show", "" ) })
  })
  </script>
